<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f0d" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <title>potcount — game</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <div class="topbar">
    <a class="brand" href="/" style="text-decoration:none;color:inherit">pot<b>count</b></a>
    <nav>
      <button class="ghost small" id="share">Share</button>
      <a class="pill pot-link" href="/pot"><svg class="cardstack" width="17" height="17" viewBox="0 0 20 20" fill="none" aria-hidden="true"><rect x="2.6" y="5.2" width="8.4" height="11.6" rx="2" transform="rotate(-11 6.8 11)" fill="var(--surface)" stroke="currentColor" stroke-width="1.3"/><rect x="8.6" y="3.4" width="8.4" height="11.6" rx="2" transform="rotate(10 12.8 9.2)" fill="var(--surface)" stroke="currentColor" stroke-width="1.3"/><path d="M12.8 7.4l1.1 1.9-1.1 1.9-1.1-1.9z" fill="currentColor"/></svg>Split</a>
      <span id="nav-me"></span>
    </nav>
  </div>
  <script type="module" src="/js/nav.js"></script>

  <div class="wrap" id="app">
    <p class="muted">Loading…</p>
  </div>

  <dialog id="join-modal">
    <form method="dialog" class="stack" style="min-width:260px">
      <h3 id="join-title">Join this game</h3>
      <p class="small muted" id="join-sub">Enter your name to take a seat.</p>
      <input id="join-name" placeholder="Your name" maxlength="40" />
      <button id="join-go" type="button">Join as player</button>
      <button id="join-watch" class="ghost" type="button">Just watch</button>
    </form>
  </dialog>

  <dialog id="money-modal">
    <form method="dialog" class="stack" style="min-width:260px">
      <h3 id="modal-title">Add money</h3>
      <label>Amount — tap chips to stack</label>
      <div class="chiprow" id="modal-chips">
        <button type="button" class="chip c5" data-chip="5">5</button>
        <button type="button" class="chip c10" data-chip="10">10</button>
        <button type="button" class="chip c25" data-chip="25">25</button>
        <button type="button" class="chip c50" data-chip="50">50</button>
        <button type="button" class="chip c100" data-chip="100">100</button>
        <button type="button" class="chip clear" data-chip="clear">C</button>
      </div>
      <input id="modal-amount" type="number" inputmode="decimal" step="any" min="0" placeholder="0" />
      <div class="row tight" style="margin-top:8px">
        <button value="cancel" class="secondary" type="submit">Cancel</button>
        <button id="modal-add" type="button">Add</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="/js/game.js"></script>
</body>
</html>
