<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0b0d" />
    <!-- Fonts are self-hosted (see @font-face in app.css). Preload the two latin
         woff2 so first paint has the brand voice without a Google Fonts round-trip. -->
    <link rel="preload" href="%sveltekit.assets%/fonts/space-grotesk-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="%sveltekit.assets%/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="icon" type="image/png" sizes="96x96" href="%sveltekit.assets%/favicon-96.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon-16.png" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
    <!-- Installable web app (add to home screen) — standalone, no service worker. -->
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="potcount" />

    <!-- SEO + social link previews live in the root +layout.svelte <svelte:head>
         (NOT here): SvelteKit can only dedupe <svelte:head> tags against each
         other, not against this static template, so keeping og/description here
         double-emitted them on pages that set their own. -->

    <!-- Structured data — lets Google understand potcount as a free web app -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "potcount",
      "url": "https://potcount.com",
      "description": "Track buy-ins and top-ups at your poker home game. potcount works out who pays who with the fewest payments, splits messy all-in pots (double-board PLO, run-it-twice, hi-lo), and tracks your profit over time.",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Any (web browser)",
      "browserRequirements": "Requires JavaScript",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
