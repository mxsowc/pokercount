<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0f0d" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&amp;family=Inter:wght@400;450;500;600;700&amp;display=swap" />
    <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon-16.png" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
    <!-- TEMP DEBUG: surface any JS error on-screen (mobile has no console). Remove after diagnosing. -->
    <script>
      (function () {
        function box() {
          var d = document.getElementById('__pcerr');
          if (!d) {
            d = document.createElement('div');
            d.id = '__pcerr';
            d.style.cssText = 'position:fixed;left:0;right:0;bottom:0;z-index:99999;background:#b00020;color:#fff;font:12px/1.45 ui-monospace,monospace;padding:10px;white-space:pre-wrap;max-height:55vh;overflow:auto';
            (document.body || document.documentElement).appendChild(d);
          }
          return d;
        }
        function show(m) { try { box().textContent += m + '\n\n'; } catch (e) {} }
        window.addEventListener('error', function (e) {
          show('ERROR: ' + (e.message || (e.error && e.error.message) || e.error || 'unknown') +
               (e.filename ? '\n@ ' + e.filename + ':' + e.lineno + ':' + e.colno : ''));
        });
        window.addEventListener('unhandledrejection', function (e) {
          show('PROMISE REJECTION: ' + (e.reason && (e.reason.stack || e.reason.message || e.reason)));
        });
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
